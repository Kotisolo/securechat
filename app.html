<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SecureChat App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f7fb;--panel:#fff;--panel2:#f1f3f9;--text:#111827;--muted:#667085;--accent:#6d5dfc;--accent2:#8b7cff;--green:#17b26a;--red:#f04438;--border:#e4e7ec}
body{font-family:Inter,system-ui,Arial,sans-serif;background:linear-gradient(135deg,#eef2ff,#fff7ed);height:100vh;overflow:hidden;color:var(--text)}button,input,textarea{font-family:inherit}
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px}.auth-card{width:380px;background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.9);border-radius:24px;box-shadow:0 30px 80px rgba(16,24,40,.16);padding:30px}.logo{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,var(--accent),#a855f7);display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:24px;margin:0 auto 14px}.auth-title{text-align:center;font-size:28px;font-weight:900;color:var(--accent);margin-bottom:4px}.auth-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}.tabs{display:flex;background:#eef2ff;border-radius:14px;padding:4px;margin-bottom:18px}.tab{flex:1;border:0;border-radius:11px;background:transparent;padding:10px;font-weight:800;color:#667085;cursor:pointer}.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}.field{margin-bottom:12px}.field input{width:100%;border:1px solid var(--border);background:white;padding:13px 14px;border-radius:14px;font-size:15px;outline:none}.field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(109,93,252,.12)}.auth-btn{width:100%;border:0;border-radius:14px;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-weight:900;font-size:15px;cursor:pointer;margin-top:6px}.err{min-height:18px;text-align:center;color:var(--red);font-size:13px;margin-top:12px}
#app{height:100vh;display:none;flex-direction:column;padding:14px;gap:14px}#app.on{display:flex}.topbar{height:66px;background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.95);border-radius:24px;box-shadow:0 10px 30px rgba(16,24,40,.08);display:flex;align-items:center;padding:0 16px;gap:12px}.top-logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#a855f7);display:flex;align-items:center;justify-content:center;color:white;font-weight:900}.brand{font-weight:900;font-size:20px;color:var(--accent)}.tag{font-size:11px;color:var(--muted);font-weight:700}.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center}.me{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:#f8faff;border-radius:999px;padding:6px 12px 6px 6px;cursor:pointer}.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a855f7);color:white;display:flex;align-items:center;justify-content:center;font-weight:900}.pill{font-size:12px;border-radius:999px;padding:6px 10px;font-weight:900}.pill.live{color:#067647;background:#ecfdf3;border:1px solid #abefc6}.pill.off{color:#b42318;background:#fef3f2;border:1px solid #fecdca}.icon-btn{border:1px solid var(--border);background:white;border-radius:12px;width:38px;height:38px;cursor:pointer;font-size:17px}
.main{flex:1;display:flex;gap:14px;min-height:0}.sidebar{width:330px;min-width:330px;background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.95);border-radius:24px;box-shadow:0 18px 50px rgba(16,24,40,.08);display:flex;flex-direction:column;overflow:hidden}.search{padding:14px;border-bottom:1px solid var(--border)}.search input{width:100%;border:1px solid var(--border);border-radius:14px;background:#f2f4f7;padding:12px;outline:none}.section{font-size:11px;font-weight:900;color:var(--accent);letter-spacing:.12em;padding:12px 16px 4px}#contacts{flex:1;overflow:auto;padding:4px 8px 12px}.contact{display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;cursor:pointer;margin:4px 0}.contact:hover,.contact.active{background:#eef2ff}.contact .name{font-weight:900}.contact .last{font-size:12px;color:var(--muted);margin-top:3px}.empty{text-align:center;color:var(--muted);padding:40px 20px;line-height:1.5}
.chat{flex:1;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.95);border-radius:24px;box-shadow:0 18px 50px rgba(16,24,40,.08);display:flex;flex-direction:column;overflow:hidden;min-width:0}.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:30px}.chat-head{display:none;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.85)}.chat-head.on{display:flex}.chat-title{font-weight:900}.chat-status{font-size:12px;color:var(--muted)}.messages{flex:1;overflow:auto;padding:18px;display:none;flex-direction:column;gap:8px}.messages.on{display:flex}.msg{max-width:72%;padding:10px 13px;border-radius:18px;line-height:1.45;word-break:break-word}.msg.me{align-self:flex-end;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-bottom-right-radius:5px}.msg.them{align-self:flex-start;background:white;border:1px solid var(--border);border-bottom-left-radius:5px}.msg small{display:block;opacity:.65;font-size:10px;margin-top:4px}.composer{display:none;align-items:flex-end;gap:8px;padding:12px;border-top:1px solid var(--border);background:rgba(255,255,255,.9)}.composer.on{display:flex}.composer textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:20px;padding:12px 14px;outline:none;max-height:110px}.send{border:0;border-radius:50%;width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:18px;font-weight:900;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center;padding:20px;z-index:50}.modal.on{display:flex}.modal-card{width:min(420px,96vw);background:white;border-radius:24px;padding:24px;box-shadow:0 30px 80px rgba(16,24,40,.25)}.modal-title{font-weight:900;font-size:22px;color:var(--accent);margin-bottom:14px}.profile-line{padding:10px 0;border-bottom:1px solid var(--border)}.profile-line b{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}.close{margin-top:18px;width:100%;border:0;border-radius:14px;background:#eef2ff;color:var(--accent);font-weight:900;padding:12px;cursor:pointer}.toast{position:fixed;top:16px;right:16px;background:white;border:1px solid var(--border);border-radius:14px;box-shadow:0 15px 40px rgba(16,24,40,.16);padding:12px 14px;display:none;z-index:60;max-width:300px}.toast.on{display:block}
@media(max-width:760px){#app{padding:0;gap:0}.topbar{border-radius:0;height:62px}.main{gap:0}.sidebar{width:100%;min-width:100%;border-radius:0}.sidebar.hide{display:none}.chat{display:none;border-radius:0;border:0}.chat.mobile-on{display:flex}.chat-head{padding-left:8px}.back{display:inline-flex!important}}.back{display:none;border:0;background:transparent;font-size:26px;cursor:pointer;margin-right:2px}
</style>
</head>
<body>
<div id="auth"><div class="auth-card"><div class="logo">SC</div><div class="auth-title">SecureChat</div><div class="auth-sub">Private messaging · live contacts · realtime chat</div><div class="tabs"><button id="tab-login" class="tab active" onclick="switchTab('login')">Sign in</button><button id="tab-reg" class="tab" onclick="switchTab('reg')">Register</button></div><div id="login-form"><div class="field"><input id="l-phone" placeholder="Phone number" autocomplete="username"></div><div class="field"><input id="l-pass" placeholder="Password" type="password" autocomplete="current-password"></div><button class="auth-btn" onclick="doLogin()">Sign in →</button></div><div id="reg-form" style="display:none"><div class="field"><input id="r-name" placeholder="Your name"></div><div class="field"><input id="r-phone" placeholder="Phone number"></div><div class="field"><input id="r-pass" placeholder="Password - min 8 chars" type="password"></div><button class="auth-btn" onclick="doRegister()">Create account →</button></div><div id="auth-err" class="err"></div></div></div>
<div id="app"><div class="topbar"><div class="top-logo">SC</div><div><div class="brand">SecureChat</div><div class="tag">E2EE ready · LIVE</div></div><div class="top-actions"><div class="me" onclick="openMyProfile()"><div id="me-av" class="avatar">?</div><span id="me-name">You</span></div><div id="conn-badge" class="pill off">● Connecting</div><button class="icon-btn" onclick="doLogout()" title="Logout">🚪</button></div></div><div class="main"><input id="search" placeholder="Search by name or phone..." oninput="loadContacts()"> <div class="section">CONTACTS</div><div id="contacts"><div class="empty">Loading contacts…</div></div></div><div id="chat" class="chat"><div id="empty-chat" class="empty-chat"><div><div style="font-size:48px;margin-bottom:10px">🔐</div><h2>Select a chat</h2><p>Choose a contact from the left side to start messaging.</p></div></div><div id="chat-head" class="chat-head"><button class="back" onclick="backToContacts()">‹</button><div id="chat-av" class="avatar">?</div><div><div id="chat-name" class="chat-title">Contact</div><div id="chat-status" class="chat-status">Encrypted conversation</div></div></div><div id="messages" class="messages"></div><div id="composer" class="composer"><textarea id="msg-input" rows="1" placeholder="Message..." onkeydown="msgKey(event)"></textarea><button class="send" onclick="sendMessage()">➤</button></div></div></div></div>
<div id="profile-modal" class="modal" onclick="if(event.target.id==='profile-modal')closeModal()"><div class="modal-card"><div class="modal-title">Profile</div><div class="profile-line"><b>Name</b><span id="p-name">-</span></div><div class="profile-line"><b>Phone</b><span id="p-phone">-</span></div><div class="profile-line"><b>User ID</b><span id="p-id">-</span></div><div class="profile-line"><b>Status</b><span>🟢 Live</span></div><button class="close" onclick="closeModal()">Close</button></div></div><div id="toast" class="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const g=id=>document.getElementById(id);const S={token:null,me:null,contacts:[],active:null,messages:{},socket:null};function toast(msg){const t=g('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000)}function setErr(msg){g('auth-err').textContent=msg||''}function initials(name){return(name||'?').trim().slice(0,2).toUpperCase()}function convId(a,b){return[String(a),String(b)].sort().join('-')}function timeStr(v){try{return new Date(v||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}catch{return''}}
async function api(path,opts={}){const headers={'Content-Type':'application/json'};if(S.token)headers.Authorization='Bearer '+S.token;const res=await fetch(path,{method:opts.method||'GET',headers,body:opts.body?JSON.stringify(opts.body):undefined});let data={};try{data=await res.json()}catch{}if(!res.ok)throw new Error(data.error||data.message||'Request failed');return data}
function switchTab(t){g('tab-login').classList.toggle('active',t==='login');g('tab-reg').classList.toggle('active',t==='reg');g('login-form').style.display=t==='login'?'block':'none';g('reg-form').style.display=t==='reg'?'block':'none';setErr('')}
async function doLogin(){const phone=g('l-phone').value.trim(),password=g('l-pass').value;if(!phone||!password)return setErr('Enter phone and password');try{const r=await api('/api/login',{method:'POST',body:{phone,password}});await onAuth(r.token,r.user)}catch(e){setErr(e.message)}}
async function doRegister(){const username=g('r-name').value.trim(),phone=g('r-phone').value.trim(),password=g('r-pass').value;if(!username||!phone||!password)return setErr('Enter name, phone and password');try{const r=await api('/api/register',{method:'POST',body:{username,phone,password}});await onAuth(r.token,r.user)}catch(e){setErr(e.message)}}
async function onAuth(token,user){S.token=token;S.me=user;localStorage.setItem('sc_token',token);localStorage.setItem('sc_user',JSON.stringify(user));g('auth').style.display='none';g('app').classList.add('on');g('me-name').textContent=user.username||'User';g('me-av').textContent=initials(user.username);connectSocket();await loadContacts()}
async function loadContacts() {
  try {
    const search = (g('search').value || '').trim();

    // Don't show anyone until the user searches
    if (search.length < 2) {
      S.contacts = [];
      renderContacts();
      return;
    }

    const users = await api('/api/users?q=' + encodeURIComponent(search));

    S.contacts = (Array.isArray(users) ? users : []).filter(
      u => String(u.id) !== String(S.me.id)
    );

  } catch (e) {
    console.error('loadContacts error:', e);
    S.contacts = [];
  }

  renderContacts();
}
function renderContacts(){const box=g('contacts'),q=(g('search').value||'').toLowerCase();const list=S.contacts.filter(c=>(c.username||'').toLowerCase().includes(q)||(c.phone||'').includes(q));if(!list.length){box.innerHTML='<div class="empty">No contacts yet.<br>Ask a friend to register, then refresh.</div>';return}box.innerHTML='';list.forEach(c=>{const id=convId(S.me.id,c.id),msgs=S.messages[id]||[],last=msgs[msgs.length-1];const row=document.createElement('div');row.className='contact'+(S.active&&String(S.active.id)===String(c.id)?' active':'');row.onclick=()=>openChat(c.id);row.innerHTML=`<div class="avatar">${initials(c.username)}</div><div style="min-width:0"><div class="name">${escapeHtml(c.username||'User')}</div><div class="last">${last?escapeHtml(last.text||'Message'):(c.phone?escapeHtml(c.phone):'Tap to chat')}</div></div>`;box.appendChild(row)})}
async function openChat(userId){const c=S.contacts.find(x=>String(x.id)===String(userId));if(!c)return;S.active=c;g('empty-chat').style.display='none';g('chat-head').classList.add('on');g('messages').classList.add('on');g('composer').classList.add('on');g('chat-av').textContent=initials(c.username);g('chat-name').textContent=c.username||'User';g('sidebar').classList.add('hide');g('chat').classList.add('mobile-on');await loadMessages();renderContacts()}
function backToContacts(){g('sidebar').classList.remove('hide');g('chat').classList.remove('mobile-on')}async function loadMessages(){if(!S.active)return;const id=convId(S.me.id,S.active.id);try{const rows=await api('/api/messages/'+encodeURIComponent(id));S.messages[id]=rows.map(m=>({id:m.id,senderId:m.senderId||m.sender_id,recipientId:m.recipientId||m.recipient_id,text:m.text||m.message||m.ciphertext||'',timestamp:m.timestamp||m.created_at}))}catch(e){console.warn('loadMessages failed:',e.message);S.messages[id]=S.messages[id]||[]}renderMessages()}
function renderMessages(){const box=g('messages');box.innerHTML='';if(!S.active)return;const id=convId(S.me.id,S.active.id),msgs=S.messages[id]||[];msgs.forEach(m=>{const div=document.createElement('div'),mine=String(m.senderId)===String(S.me.id);div.className='msg '+(mine?'me':'them');div.innerHTML=`${escapeHtml(m.text||'')}<small>${timeStr(m.timestamp)}</small>`;box.appendChild(div)});box.scrollTop=box.scrollHeight}
async function sendMessage(){if(!S.active)return toast('Select a contact first');const input=g('msg-input'),text=input.value.trim();if(!text)return;input.value='';const id=convId(S.me.id,S.active.id);const local={id:'local-'+Date.now(),senderId:S.me.id,recipientId:S.active.id,text,timestamp:new Date().toISOString()};S.messages[id]=S.messages[id]||[];S.messages[id].push(local);renderMessages();renderContacts();try{await api('/api/messages',{method:'POST',body:{conversationId:id,recipientId:S.active.id,iv:'plain',ciphertext:text,messageType:'text',metadata:{}}})}catch(e){toast('Send failed: '+e.message)}}
function msgKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}function connectSocket(){if(typeof io==='undefined'){g('conn-badge').className='pill off';g('conn-badge').textContent='● Offline';return}try{S.socket=io({auth:{token:S.token},transports:['websocket','polling']});S.socket.on('connect',()=>{g('conn-badge').className='pill live';g('conn-badge').textContent='● Live'});S.socket.on('disconnect',()=>{g('conn-badge').className='pill off';g('conn-badge').textContent='● Offline'});S.socket.on('message:new',m=>{const other=String(m.senderId)===String(S.me.id)?m.recipientId:m.senderId;const id=convId(S.me.id,other);S.messages[id]=S.messages[id]||[];S.messages[id].push({id:m.id||Date.now(),senderId:m.senderId,recipientId:m.recipientId,text:m.text||m.ciphertext||'',timestamp:m.timestamp||new Date().toISOString()});if(S.active&&String(S.active.id)===String(other))renderMessages();renderContacts()})}catch(e){console.error('Socket error:',e)}}
function openMyProfile(){if(!S.me)return toast('Please login first');g('p-name').textContent=S.me.username||'N/A';g('p-phone').textContent=S.me.phone||'N/A';g('p-id').textContent=S.me.id||'N/A';g('profile-modal').classList.add('on')}function closeModal(){g('profile-modal').classList.remove('on')}function doLogout(){localStorage.removeItem('sc_token');localStorage.removeItem('sc_user');location.reload()}function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
(async function boot(){const token=localStorage.getItem('sc_token'),user=JSON.parse(localStorage.getItem('sc_user')||'null');if(token&&user){try{await onAuth(token,user)}catch{doLogout()}}})();
</script></body></html>
