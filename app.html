<title>SC — SecureChat</title>

<meta name="description" content="SecureChat — End-to-end encrypted messaging">


<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
,::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg0:#06080f;--bg1:#0b0f1a;--bg2:#0f1420;--bg3:#151c2e;--bg4:#1a2338;
--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
--accent:#4f8ef7;--accent2:#6aa3ff;
--green:#00d4aa;--red:#ff5f5f;--amber:#ffb830;--purple:#9f7aea;
--t0:#f0f4ff;--t1:#8899bb;--t2:#4a5878;--t3:#2a3450;
--glow:0 0 40px rgba(79,142,247,0.15);
--sh:0 20px 60px rgba(0,0,0,0.6);
--font:'Inter',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg0);}
body{font-family:var(--font);font-size:14px;color:var(--t0);}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* NOISE TEXTURE OVERLAY */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(79,142,247,0.3);}50%{box-shadow:0 0 40px rgba(79,142,247,0.6);}}
@keyframes slideIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes ripple{to{transform:scale(4);opacity:0;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}

/* AUTH */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg0);}
#auth::after{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(79,142,247,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none;animation:float 6s ease-in-out infinite;}
.auth-card{background:linear-gradient(135deg,rgba(15,20,32,0.95),rgba(11,15,26,0.95));border:1px solid var(--border2);border-radius:24px;padding:40px;width:380px;backdrop-filter:blur(20px);box-shadow:var(--sh),0 0 0 1px rgba(255,255,255,0.03);animation:fadeUp 0.5s ease-out;position:relative;z-index:1;}
.auth-logo-wrap{text-align:center;margin-bottom:28px;}
.auth-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:22px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:32px;animation:glow 3s ease-in-out infinite;box-shadow:0 8px 32px rgba(79,142,247,0.4);}
.auth-title{font-size:24px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-sub{font-size:13px;color:var(--t2);margin-top:4px;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px;}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;color:var(--t2);transition:all 0.2s;}
.auth-tab.act{background:linear-gradient(135deg,#d4aa50,#b8892a);color:#0a0800;font-weight:700;box-shadow:0 4px 14px rgba(212,170,80,0.4);}
.auth-field{position:relative;margin-bottom:12px;}
.auth-field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 14px 13px 40px;color:var(--t0);font-size:14px;outline:none;font-family:var(--font);transition:all 0.2s;}
.auth-input:focus{border-color:rgba(79,142,247,0.5);background:var(--bg4);box-shadow:0 0 0 3px rgba(79,142,247,0.1);}
.auth-input::placeholder{color:var(--t2);}
.auth-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#d4aa50,#b8892a,#d4aa50);color:#0a0800;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.2s;margin-top:8px;letter-spacing:0.2px;position:relative;overflow:hidden;}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,170,80,0.5);}
.auth-btn:active{transform:translateY(0);}
.auth-err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px;animation:fadeIn 0.2s;}
.auth-secure{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:#b8892a;margin-top:20px;}
.auth-secure-dot{width:6px;height:6px;background:#d4aa50;border-radius:50%;animation:pulse 2s infinite;}

/* APP */
#app{display:none;height:100vh;overflow:hidden;}
#app.on{display:flex;flex-direction:column;}

/* TOP BAR */
#topbar{background:linear-gradient(180deg,var(--bg1),var(--bg2));border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;backdrop-filter:blur(10px);position:relative;z-index:10;}
.tb-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 12px rgba(79,142,247,0.4);}
.tb-brand{font-size:16px;font-weight:800;letter-spacing:-0.3px;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tb-tagline{font-size:9px;color:var(--green);font-weight:600;letter-spacing:0.8px;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tb-me{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.tb-me:hover{background:var(--bg4);border-color:var(--border2);}
.tb-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.conn-pill{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;transition:all 0.3s;}
.conn-pill.live{background:rgba(0,212,170,0.12);color:var(--green);border:1px solid rgba(0,212,170,0.3);}
.conn-pill.off{background:rgba(255,95,95,0.12);color:var(--red);border:1px solid rgba(255,95,95,0.3);}
.tb-btn{width:32px;height:32px;border-radius:9px;border:none;background:var(--bg3);color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s;border:1px solid var(--border);}
.tb-btn:hover{background:var(--bg4);color:var(--t0);border-color:var(--border2);}

/* MAIN LAYOUT */
#main{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#sb{width:300px;min-width:300px;background:linear-gradient(180deg,var(--bg1),var(--bg2));border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-search{padding:12px 14px;border-bottom:1px solid var(--border);}
.sb-search-wrap{position:relative;}
.sb-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:14px;pointer-events:none;}
.sb-search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 12px 10px 36px;color:var(--t0);font-size:13px;outline:none;font-family:var(--font);transition:all 0.2s;}
.sb-search-input:focus{border-color:rgba(79,142,247,0.4);background:var(--bg4);}
.sb-search-input::placeholder{color:var(--t2);}
.sb-section{padding:10px 14px 4px;font-size:10px;font-weight:700;color:var(--t2);letter-spacing:1px;}
#conv-list{flex:1;overflow-y:auto;padding:4px 8px 8px;}
.conv-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:14px;cursor:pointer;transition:all 0.15s;margin-bottom:2px;position:relative;}
.conv-item::after{content:'';position:absolute;inset:0;border-radius:14px;opacity:0;transition:opacity 0.15s;background:linear-gradient(135deg,rgba(79,142,247,0.08),rgba(159,122,234,0.08));}
.conv-item:hover::after{opacity:1;}
.conv-item.act{background:linear-gradient(135deg,rgba(79,142,247,0.12),rgba(159,122,234,0.06));border:1px solid rgba(79,142,247,0.2);}
.conv-item.act .conv-name{color:var(--accent2);}
.c-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;position:relative;}
.c-avatar.online::after{content:'';position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:var(--green);border-radius:50%;border:2px solid var(--bg1);box-shadow:0 0 6px rgba(0,212,170,0.6);}
.conv-info{flex:1;min-width:0;}
.conv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.conv-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-time{font-size:10px;color:var(--t2);flex-shrink:0;}
.conv-bot{display:flex;align-items:center;gap:4px;}
.conv-last{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.conv-badge{background:linear-gradient(135deg,#d4aa50,#b8892a);color:#0a0800;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;box-shadow:0 2px 8px rgba(212,170,80,0.4);}
.lock-ico{font-size:9px;color:var(--t3);}
.no-contacts{padding:40px 20px;text-align:center;color:var(--t2);}
.no-contacts-icon{font-size:40px;margin-bottom:10px;opacity:0.4;}

/* CHAT */
#ca{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg0);position:relative;}
#ca::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(79,142,247,0.04) 0%,transparent 60%);pointer-events:none;}
#es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;position:relative;z-index:1;}
.es-icon{width:80px;height:80px;background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(159,122,234,0.1));border:1px solid rgba(79,142,247,0.2);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;animation:float 4s ease-in-out infinite;}
.es-title{font-size:18px;font-weight:700;color:var(--t1);}
.es-desc{font-size:12px;color:var(--t2);text-align:center;max-width:240px;line-height:1.7;}
.es-features{display:flex;gap:12px;margin-top:8px;}
.es-feat{background:rgba(212,170,80,0.06);border:1px solid rgba(212,170,80,0.2);border-radius:10px;padding:8px 12px;font-size:11px;color:#d4aa50;display:flex;align-items:center;gap:5px;}

/* CHAT HEADER */
#chdr{background:linear-gradient(180deg,var(--bg1),var(--bg2));border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative;z-index:5;}
.ch-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;transition:transform 0.2s;}
.ch-avatar:hover{transform:scale(1.05);}
.ch-name{font-weight:700;font-size:15px;cursor:pointer;}
.ch-status{font-size:11px;display:flex;align-items:center;gap:4px;margin-top:1px;}
.ch-status.on{color:var(--green);}
.ch-status.off{color:var(--t2);}
.ch-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.ch-dot.on{animation:pulse 2s infinite;box-shadow:0 0 5px rgba(0,212,170,0.6);}
.ch-actions{margin-left:auto;display:flex;gap:6px;}
.e2ee-chip{display:flex;align-items:center;gap:5px;background:rgba(212,170,80,0.08);border:1px solid rgba(212,170,80,0.3);border-radius:20px;padding:5px 11px;font-size:10px;font-weight:700;color:#d4aa50;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;}
.e2ee-chip:hover{background:rgba(212,170,80,0.14);}
.ch-btn{width:34px;height:34px;border-radius:10px;border:none;background:var(--bg3);color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s;border:1px solid var(--border);}
.ch-btn:hover{background:var(--bg4);color:var(--t0);transform:scale(1.05);}
.ch-btn.call-audio{color:#d4aa50;background:rgba(212,170,80,0.08);border-color:rgba(212,170,80,0.25);}
.ch-btn.call-video{color:#d4aa50;background:rgba(212,170,80,0.08);border-color:rgba(212,170,80,0.25);}

/* MESSAGES /
#mw{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:3px;position:relative;z-index:1;}
.date-chip{align-self:center;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:10px;color:var(--t2);margin:10px 0 6px;}
.sys-msg{align-self:center;background:rgba(212,170,80,0.07);border:1px solid rgba(212,170,80,0.2);border-radius:20px;padding:5px 14px;font-size:10px;color:#d4aa50;margin:4px 0;}
.msg-grp{display:flex;flex-direction:column;margin-bottom:2px;animation:msgIn 0.2s ease-out;}
.msg-grp.out{align-items:flex-end;}
.msg-grp.inc{align-items:flex-start;}
.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:74%;}
.msg-grp.out .msg-row{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.bw{display:flex;flex-direction:column;gap:1px;}
.msg-grp.out .bw{align-items:flex-end;}
.bubble{padding:10px 14px;border-radius:18px;line-height:1.6;word-break:break-word;font-size:14px;position:relative;max-width:420px;}
.msg-grp.out .bubble{background:linear-gradient(135deg,#1e4fa8,#2a6cf5);color:#fff;border-bottom-right-radius:4px;box-shadow:0 4px 16px rgba(42,108,245,0.3);}
.msg-grp.inc .bubble{background:var(--bg3);color:var(--t0);border-bottom-left-radius:4px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.bubble.edited::after{content:' · edited';font-size:10px;opacity:0.5;}
.bm{display:flex;align-items:center;gap:5px;padding:0 3px;margin-top:2px;}
.msg-grp.out .bm{flex-direction:row-reverse;}
.msg-time{font-size:10px;color:var(--t2);}
.msg-lock{font-size:9px;color:var(--t3);}
.msg-tick{font-size:11px;color:var(--t2);}
.msg-tick.rd{color:var(--accent2);}
.rqt{background:rgba(255,255,255,0.06);border-left:3px solid var(--accent);border-radius:8px;padding:6px 10px;margin-bottom:6px;font-size:11px;color:var(--t1);}
.rqn{color:var(--accent2);font-weight:600;font-size:10px;margin-bottom:2px;}
.reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.rx-pill{background:var(--bg4);border:1px solid var(--border2);border-radius:12px;padding:3px 7px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all 0.15s;}
.rx-pill:hover{transform:scale(1.1);border-color:var(--accent);}
.rx-pill.mine{background:rgba(79,142,247,0.15);border-color:rgba(79,142,247,0.4);}
.rx-pill span{font-size:10px;color:var(--t1);}
.fwd-tag{font-size:10px;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:3px;}
/ Image /
.img-wrap{border-radius:14px;overflow:hidden;max-width:260px;cursor:pointer;position:relative;}
.img-wrap img{width:100%;height:auto;display:block;max-height:220px;object-fit:cover;transition:transform 0.3s;}
.img-wrap:hover img{transform:scale(1.02);}
/ File /
.file-bub{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 12px;min-width:180px;cursor:pointer;border:1px solid rgba(255,255,255,0.06);transition:all 0.2s;}
.file-bub:hover{background:rgba(255,255,255,0.08);}
.file-icon{font-size:24px;}.file-name{font-size:12px;font-weight:600;}.file-size{font-size:10px;opacity:0.6;margin-top:1px;}
.file-dl{font-size:10px;color:var(--accent2);margin-top:2px;cursor:pointer;}
/ Voice /
.voice-wrap{display:flex;align-items:center;gap:10px;min-width:220px;}
.v-play{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.v-play:hover{background:rgba(255,255,255,0.25);transform:scale(1.1);}
.v-wave{flex:1;height:28px;display:flex;align-items:center;gap:2px;}
.v-bar{width:3px;border-radius:3px;background:rgba(255,255,255,0.5);transition:height 0.1s;}
.v-dur{font-size:11px;color:rgba(255,255,255,0.6);flex-shrink:0;}
.msg-grp.inc .v-play{background:rgba(79,142,247,0.2);color:var(--accent2);}
.msg-grp.inc .v-bar{background:var(--accent);opacity:0.6;}
.msg-grp.inc .v-dur{color:var(--t1);}
/ GIF / Sticker /
.gif-msg{font-size:56px;line-height:1;cursor:pointer;display:block;}
.sticker-msg{font-size:64px;line-height:1;display:block;}
/ Link preview */
.link-prev{border:1px solid var(--border2);border-radius:12px;overflow:hidden;max-width:280px;cursor:pointer;margin-top:6px;transition:all 0.2s;}
.link-prev:hover{border-color:rgba(79,142,247,0.4);}
.lp-img{width:100%;height:80px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:30px;}
.lp-body{padding:8px 10px;}
.lp-title{font-size:12px;font-weight:600;margin-bottom:2px;}
.lp-url{font-size:10px;color:var(--t2);}

/* TYPING */
#typing-bar{display:none;padding:4px 24px;font-size:11px;color:var(--t2);align-items:center;gap:6px;flex-shrink:0;}
#typing-bar.on{display:flex;}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--t2);display:inline-block;animation:bounce 1.2s infinite;}
.t-dot:nth-child(2){animation-delay:0.2s;}
.t-dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* INPUT AREA */
#ia{background:linear-gradient(0deg,var(--bg1),var(--bg2));border-top:1px solid var(--border);padding:12px 18px;flex-shrink:0;position:relative;z-index:5;}
.reply-bar{display:none;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:12px;margin-bottom:10px;border-left:3px solid #d4aa50;}
.reply-bar.on{display:flex;}
.reply-text{flex:1;font-size:11px;color:var(--t1);}
.reply-name{color:#d4aa50;font-weight:600;}
.reply-x{background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px;transition:color 0.15s;}
.reply-x:hover{color:var(--t0);}
.input-row{display:flex;align-items:flex-end;gap:8px;}
.input-left{display:flex;gap:4px;flex-shrink:0;}
.input-right{display:flex;gap:4px;flex-shrink:0;}
.i-btn{width:36px;height:36px;border-radius:11px;border:none;background:var(--bg3);color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;border:1px solid var(--border);}
.i-btn:hover{background:var(--bg4);color:var(--t0);border-color:var(--border2);transform:scale(1.05);}
#msg-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--t0);font-size:14px;font-family:var(--font);outline:none;resize:none;max-height:110px;overflow-y:auto;line-height:1.5;transition:all 0.2s;scrollbar-width:none;}
#msg-input::-webkit-scrollbar{display:none;}
#msg-input:focus{border-color:rgba(212,170,80,0.4);background:var(--bg4);box-shadow:0 0 0 3px rgba(212,170,80,0.06);}
#msg-input::placeholder{color:var(--t2);}
.send-btn{width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,#d4aa50,#b8892a);color:#0a0800;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;flex-shrink:0;box-shadow:0 4px 14px rgba(212,170,80,0.4);font-weight:800;}
.send-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(212,170,80,0.6);}
.send-btn:active{transform:scale(0.95);}
#vrec-bar{display:none;align-items:center;gap:8px;background:rgba(255,95,95,0.1);border-radius:20px;padding:6px 14px;border:1px solid rgba(255,95,95,0.2);flex:1;}
#vrec-bar.on{display:flex;}
.rec-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse 1s infinite;flex-shrink:0;}
#rec-canvas{flex:1;height:28px;}
#rec-time{font-size:12px;font-family:monospace;color:var(--t0);min-width:34px;}
.rec-x{background:none;border:none;color:var(--t2);cursor:pointer;font-size:18px;}

/* EMOJI PICKER */
#emoji-picker{display:none;position:absolute;bottom:72px;right:18px;background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:10px;box-shadow:var(--sh);z-index:200;flex-wrap:wrap;gap:3px;width:258px;animation:fadeUp 0.2s ease-out;}
#emoji-picker.on{display:flex;}
.ep-emoji{background:none;border:none;font-size:21px;cursor:pointer;border-radius:8px;padding:4px;transition:all 0.15s;width:35px;height:35px;display:flex;align-items:center;justify-content:center;}
.ep-emoji:hover{transform:scale(1.3);background:var(--bg4);}

/* GIF PANEL */
#gif-panel,#sticker-panel{display:none;position:absolute;bottom:72px;left:18px;background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:14px;box-shadow:var(--sh);z-index:200;width:300px;max-height:300px;overflow-y:auto;animation:fadeUp 0.2s ease-out;}
#gif-panel.on,#sticker-panel.on{display:block;}
.panel-title{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:0.8px;margin-bottom:10px;}
.gif-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.gif-item{aspect-ratio:1;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;transition:all 0.15s;border:1px solid var(--border);}
.gif-item:hover{transform:scale(1.08);border-color:var(--accent);}
.sticker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.sticker-item{font-size:26px;cursor:pointer;text-align:center;padding:6px;border-radius:9px;transition:all 0.15s;}
.sticker-item:hover{transform:scale(1.2);background:var(--bg3);}

/* CALL OVERLAY /
#call-overlay{display:none;position:fixed;inset:0;z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#call-overlay.on{display:flex;}
#call-overlay::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,8,15,0.97),rgba(11,15,26,0.97));backdrop-filter:blur(20px);}
#call-overlay>{position:relative;z-index:1;}
.call-bg-glow{position:absolute;width:300px;height:300px;border-radius:50%;opacity:0.15;animation:glow 3s infinite;}
.call-type-label{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;}
.call-avatar{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:700;color:#fff;box-shadow:0 0 40px rgba(79,142,247,0.4);animation:float 3s ease-in-out infinite;}
.call-name{font-size:22px;font-weight:800;}
.call-status{font-size:13px;color:var(--t1);}
#call-timer{font-size:14px;color:#d4aa50;font-family:monospace;font-weight:600;display:none;}
.call-wave{display:none;gap:4px;align-items:center;height:40px;}
.call-wave.on{display:flex;}
.call-wave-bar{width:3px;border-radius:3px;background:#d4aa50;animation:cwave 0.8s ease-in-out infinite;}
.call-wave-bar:nth-child(2){animation-delay:.1s}.call-wave-bar:nth-child(3){animation-delay:.2s}
.call-wave-bar:nth-child(4){animation-delay:.3s}.call-wave-bar:nth-child(5){animation-delay:.4s}
@keyframes cwave{0%,100%{height:5px;}50%{height:32px;}}
.video-wrap{display:none;gap:12px;width:100%;max-width:700px;padding:0 24px;}
.video-wrap.on{display:flex;}
.vid-box{border-radius:14px;overflow:hidden;background:var(--bg3);border:1px solid var(--border2);position:relative;}
#remote-vid-box{flex:1;aspect-ratio:16/9;}
#local-vid-box{width:160px;aspect-ratio:4/3;flex-shrink:0;}
.vid-box video{width:100%;height:100%;object-fit:cover;display:block;}
.vid-label{position:absolute;bottom:8px;left:10px;font-size:10px;color:rgba(255,255,255,0.6);background:rgba(0,0,0,0.4);padding:2px 6px;border-radius:6px;}
.call-controls{display:flex;gap:14px;}
.call-ctrl{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s;}
.call-ctrl:hover{transform:scale(1.1);}
.call-ctrl.end-call{background:var(--red);color:#fff;box-shadow:0 4px 16px rgba(255,95,95,0.5);}
.call-ctrl.toggle{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.15);}
.call-ctrl.toggle.off{background:rgba(255,95,95,0.15);border-color:rgba(255,95,95,0.3);color:var(--red);}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:600;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:12px;}
#lightbox.on{display:flex;animation:fadeIn 0.2s;}
#lightbox img{max-width:90vw;max-height:82vh;border-radius:12px;object-fit:contain;}
.lb-close{position:absolute;top:16px;right:20px;font-size:26px;color:rgba(255,255,255,0.7);cursor:pointer;background:none;border:none;transition:color 0.15s;}
.lb-close:hover{color:#fff;}

/* CTX MENU */
.ctx-menu{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:5px;min-width:170px;box-shadow:var(--sh);z-index:400;display:none;animation:fadeIn 0.15s;}
.ctx-menu.on{display:block;}
.ctx-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;transition:background 0.15s;}
.ctx-item:hover{background:var(--bg3);}
.ctx-item.danger{color:var(--red);}
.ctx-sep{height:1px;background:var(--border);margin:4px 0;}

/* MODALS */
.modal-back{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:450;align-items:center;justify-content:center;}
.modal-back.on{display:flex;animation:fadeIn 0.2s;}
.modal-box{background:linear-gradient(135deg,var(--bg2),var(--bg1));border:1px solid var(--border2);border-radius:22px;padding:26px;max-width:420px;width:92%;box-shadow:var(--sh);max-height:88vh;overflow-y:auto;animation:fadeUp 0.25s ease-out;}
.modal-box::-webkit-scrollbar{width:3px;}
.modal-box::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.modal-title{font-size:16px;font-weight:800;margin-bottom:3px;letter-spacing:-0.3px;}
.modal-sub{font-size:12px;color:var(--t1);margin-bottom:18px;line-height:1.6;}
.modal-close{float:right;background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;margin-top:-3px;transition:color 0.15s;}
.modal-close:hover{color:var(--t0);}
.modal-block{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:monospace;font-size:10px;word-break:break-all;line-height:1.9;}
.modal-label{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:0.8px;margin-bottom:5px;margin-top:12px;}
.modal-note{font-size:11px;color:var(--t2);line-height:1.7;padding:10px;background:rgba(255,255,255,0.03);border-radius:9px;border:1px solid var(--border);margin-top:12px;}
.feat-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:13px;}
.feat-icon{font-size:20px;flex-shrink:0;}.feat-name{font-size:13px;font-weight:600;margin-bottom:2px;}.feat-desc{font-size:11px;color:var(--t1);line-height:1.5;}
.safety-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;}
.safety-block{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;font-family:monospace;font-size:11px;font-weight:700;letter-spacing:1px;}

/* NOTIF TOAST */
#toast{position:fixed;top:14px;right:14px;z-index:999;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh);font-size:13px;transform:translateX(130%);transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);max-width:290px;cursor:pointer;}
#toast.on{transform:translateX(0);}
#toast-icon{font-size:18px;}

/* SCREEN LOCK */
#screen-lock{display:none;position:fixed;inset:0;background:rgba(6,8,15,0.97);backdrop-filter:blur(24px);z-index:900;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#screen-lock.on{display:flex;animation:fadeIn 0.3s;}

#alock{display:none;position:fixed;inset:0;z-index:9999;background:rgba(6,8,14,0.97);backdrop-filter:blur(28px);flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#alock.on{display:flex;animation:fadeIn 0.3s ease;}
.al-logo{width:76px;height:76px;border-radius:20px;overflow:hidden;box-shadow:0 0 40px rgba(212,170,80,0.35);}
.al-title{font-size:22px;font-weight:800;background:linear-gradient(135deg,#f5d06a,#d4aa50);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.al-sub{font-size:13px;color:#5a4e38;margin-top:2px;}
.pdots{display:flex;gap:14px;margin:20px 0 6px;}
.pdot{width:14px;height:14px;border-radius:50%;background:rgba(212,170,80,0.15);border:2px solid rgba(212,170,80,0.35);transition:all 0.2s;}
.pdot.on{background:#d4aa50;border-color:#d4aa50;box-shadow:0 0 8px rgba(212,170,80,0.5);}
.pdot.err{background:var(--red);border-color:var(--red);animation:shake 0.4s ease-out;}
.plbl{font-size:12px;color:#5a4e38;margin-bottom:12px;}
.perr{font-size:12px;color:var(--red);min-height:16px;margin-bottom:4px;}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.pbtn{height:62px;border-radius:16px;border:1px solid rgba(212,170,80,0.2);background:rgba(212,170,80,0.06);color:#f5d06a;font-size:20px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
.pbtn:hover{background:rgba(212,170,80,0.14);border-color:rgba(212,170,80,0.4);transform:scale(1.04);}
.pbtn:active{transform:scale(0.96);}
.pbtn.emp{background:transparent;border-color:transparent;cursor:default;}
.al-acts{display:flex;gap:10px;margin-top:6px;}
.al-act{padding:8px 18px;border-radius:20px;border:1px solid rgba(212,170,80,0.25);background:transparent;color:#b8892a;font-size:12px;cursor:pointer;font-family:var(--font);transition:all 0.2s;}
.al-act:hover{background:rgba(212,170,80,0.08);}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}


/* === Premium UI Refresh v2: modern messenger polish === */
:root{
--bg0:#f5f7fb;--bg1:#ffffff;--bg2:#fbfcff;--bg3:#f0f3fa;--bg4:#e8edf7;
--border:rgba(20,31,55,0.08);--border2:rgba(20,31,55,0.12);
--accent:#6d5dfc;--accent2:#8b7cff;--green:#18c37e;--red:#ff4d67;--amber:#f59f00;--purple:#a855f7;
--t0:#101828;--t1:#475467;--t2:#667085;--t3:#98a2b3;
--glow:0 18px 60px rgba(109,93,252,0.16);--sh:0 20px 70px rgba(16,24,40,0.12);
}
html,body{background:linear-gradient(135deg,#eef2ff 0%,#f8fafc 45%,#fff7ed 100%);}
body::before{opacity:.18;}
#auth{background:radial-gradient(circle at 20% 20%,rgba(109,93,252,.18),transparent 28%),radial-gradient(circle at 80% 0%,rgba(168,85,247,.16),transparent 30%),linear-gradient(135deg,#eef2ff,#ffffff 55%,#fff7ed)}
#auth::after{background:radial-gradient(circle,rgba(109,93,252,.18),transparent 68%)}
.auth-card{background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.75);box-shadow:0 30px 90px rgba(16,24,40,.18);backdrop-filter:blur(24px);}
.auth-logo{background:linear-gradient(135deg,#6d5dfc,#a855f7)!important;box-shadow:0 16px 36px rgba(109,93,252,.32)!important;}
.auth-title{background:linear-gradient(135deg,#101828,#6d5dfc)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;background-clip:text!important;}
.auth-sub,.auth-secure{color:#667085!important;}
.auth-tabs{background:#eef2ff;border:1px solid rgba(109,93,252,.12)}
.auth-tab{color:#667085}.auth-tab.act{background:linear-gradient(135deg,#6d5dfc,#8b7cff)!important;color:#fff!important;box-shadow:0 10px 24px rgba(109,93,252,.28)!important;}
.auth-input{background:#fff;border:1px solid #e4e7ec;color:#101828;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.auth-input:focus{background:#fff;border-color:#8b7cff;box-shadow:0 0 0 4px rgba(109,93,252,.12)}
.auth-btn{background:linear-gradient(135deg,#6d5dfc,#8b7cff)!important;color:#fff!important;box-shadow:0 14px 28px rgba(109,93,252,.26)!important;}
.auth-err{color:#d92d20}
#app.on{background:linear-gradient(135deg,#eef2ff 0%,#f8fafc 35%,#ffffff 100%)}
#topbar{margin:14px 14px 0;border-radius:24px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.85);box-shadow:0 12px 34px rgba(16,24,40,.08);backdrop-filter:blur(24px);}
.tb-logo{background:linear-gradient(135deg,#6d5dfc,#a855f7)!important;box-shadow:0 12px 28px rgba(109,93,252,.28)!important;}
